<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mess Management</title>
<link rel="manifest" href="rfid-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f8;
  --panel:#ffffff;
  --panel-2:#eef2f7;
  --ink:#111827;
  --muted:#64748b;
  --line:#d7dee8;
  --line-strong:#aeb9c8;
  --accent:#14532d;
  --accent-2:#16a34a;
  --danger:#b91c1c;
  --warn:#b45309;
  --blue:#1d4ed8;
  --shadow:0 16px 44px -30px rgba(15,23,42,.55);
}
[data-theme="dark"]{
  --bg:#0d0e10;
  --panel:#16181c;
  --panel-2:#1f242b;
  --ink:#e8e9eb;
  --muted:#9ba2ab;
  --line:#262a30;
  --line-strong:#3a414b;
  --accent:#c6ff3d;
  --accent-2:#84cc16;
  --danger:#ff6b6b;
  --warn:#fbbf24;
  --blue:#60a5fa;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  min-height:100vh;
  padding-left:0;
  background:var(--bg);
  color:var(--ink);
  font-family:"Inter Tight",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
body.login-view{
  padding-left:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
}
body.login-view header,body.login-view .app-sidebar,body.login-view main{
  display:none;
}
#installBtn{display:none;}
.app-sidebar,#sidebarToggleBtn{display:none!important;}
button,input,select,textarea{font-family:inherit}
h1,h2,h3{font-family:"Fraunces",serif;letter-spacing:0}
code,.mono,.pill,.nav-icon{font-family:"JetBrains Mono",monospace}
.app-sidebar {
  display: none;
  position:fixed;inset:0 auto 0 0;width:232px;z-index:1000;
  background:linear-gradient(180deg,#111827,#0f172a);
  border-right:2px solid var(--accent-2);
  box-shadow:2px 0 16px rgba(0,0,0,.18);
  padding:18px 12px;display:flex;flex-direction:column;gap:18px;
.app-navbar-logo{display:flex;align-items:center;gap:10px;min-height:44px;padding:0 10px;color:var(--accent-2);text-decoration:none;font-size:15px;font-weight:800;letter-spacing:.7px}
.app-logo-mark{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--accent-2);color:#0f172a;font-size:13px;font-weight:900}
.app-nav-links{display:grid;gap:4px}
.app-nav-item{min-height:44px;padding:9px 12px;border-radius:10px;display:flex;align-items:center;gap:14px;text-decoration:none;font-size:14px;font-weight:700;color:#cbd5e1;transition:.18s}
.app-nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.app-nav-item.active{background:rgba(22,163,74,.22);color:#fff}
.app-nav-icon{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--accent-2);font-size:10px;font-weight:900}
.app-shell-footer{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.12)}
.app-theme-toggle{width:100%;min-height:42px;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:rgba(255,255,255,.08);color:#e5e7eb;display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;font-weight:800}
.app-theme-icon{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--accent-2);color:#0f172a;font-family:"JetBrains Mono";font-size:11px;font-weight:900}
header{padding:28px 32px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0))}
[data-theme="dark"] header{background:linear-gradient(180deg,var(--panel),rgba(22,24,28,0))}
.brand{display:flex;align-items:center;gap:14px}
.seal{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;background:var(--accent);color:#fff;font-family:"JetBrains Mono";font-weight:900}
[data-theme="dark"] .seal{color:#0d0e10}
h1{margin:0;font-size:clamp(28px,4vw,48px);line-height:1}
.sub{margin-top:5px;color:var(--muted);font-size:15px}
.top-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.wrap{padding:22px 32px 36px;display:grid;gap:18px}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.tab{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:10px;padding:10px 13px;font-weight:800;white-space:nowrap;cursor:pointer}
.tab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.card{grid-column:span 12;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}
.card h2,.card h3{margin:0 0 12px;font-size:22px}
.metric{display:grid;gap:5px}.metric .k{color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.metric .v{font-size:30px;font-weight:900}
.row{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;align-items:end}
.field{display:grid;gap:6px;grid-column:span 6}.field.third{grid-column:span 4}.field.full{grid-column:1/-1}
label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{width:100%;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel-2);color:var(--ink);padding:10px 11px;font-size:14px}
textarea{min-height:78px;resize:vertical}
.btn{min-height:40px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel);color:var(--ink);font-weight:900;padding:9px 12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
[data-theme="dark"] .btn.primary{color:#0d0e10}
.btn.good{background:var(--accent-2);border-color:var(--accent-2);color:#07130b}
.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn.warn{background:var(--warn);border-color:var(--warn);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.icon-actions{display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
.icon-btn{width:38px;height:38px;border:1px solid var(--line-strong);border-radius:10px;background:var(--panel);color:var(--ink);display:inline-grid;place-items:center;cursor:pointer;font-size:16px;font-weight:900;line-height:1;transition:.16s}
.icon-btn:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 8px 20px -18px rgba(15,23,42,.8)}
.icon-btn.edit{color:var(--blue)}
.icon-btn.delete{color:var(--danger)}
.icon-btn.warn{color:var(--warn)}
.icon-btn.good{color:var(--accent-2)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input,.toolbar select{max-width:260px}
.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.section-title h2{margin:0}
.range-shell{position:relative;margin:0;margin-left:auto}
.range-trigger{width:100%;min-width:280px;min-height:42px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel-2);color:var(--muted);display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;font-weight:700;text-align:left}
.range-trigger strong{color:var(--ink);font-weight:800}
.range-popover{position:absolute;right:0;top:48px;width:min(700px,calc(100vw - 320px));min-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 30px 80px -38px rgba(0,0,0,.7);z-index:1200;display:grid;grid-template-columns:114px 1fr}
.range-presets{border-right:1px solid var(--line);display:grid;align-content:start}
.range-presets strong{padding:18px 12px 10px;text-align:center;font-size:13px}
.range-presets button{border:0;border-top:1px solid var(--line);background:transparent;color:var(--ink);padding:12px 10px;font-weight:800;cursor:pointer;text-align:center}
.range-presets button:hover{background:var(--panel-2)}
.range-calendars{display:grid;grid-template-columns:1fr 1fr}
.range-month{padding:14px 16px;border-right:1px solid var(--line)}
.range-month:last-child{border-right:0}
.range-month-head{display:grid;grid-template-columns:32px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:12px}
.range-month:first-child .range-next,.range-month:last-child .range-prev{visibility:hidden}
.range-month-head select{padding:7px 8px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.dow{color:#8fa0b6;font-size:12px;font-weight:800}
.day-cell{height:34px;border:1px solid transparent;border-radius:999px;background:transparent;color:var(--ink);cursor:pointer;font-weight:700}
.day-cell:hover{border-color:var(--line-strong);background:var(--panel-2)}
.day-cell.today{border-color:var(--line-strong)}
.day-cell.in-range{border-radius:8px;background:rgba(22,163,74,.12)}
.day-cell.selected{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.58);display:grid;place-items:center;padding:18px;z-index:5000}
.modal{width:min(620px,100%);max-height:calc(100vh - 36px);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 80px -30px rgba(0,0,0,.65);padding:18px}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.modal-head h2{margin:0}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--panel-2)}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:11px;color:var(--muted);background:var(--panel-2);white-space:nowrap}
.status-active{color:var(--accent-2);font-weight:900}.status-blocked,.status-inactive{color:var(--danger);font-weight:900}
.counter-screen{min-height:430px;display:grid;grid-template-columns:1fr minmax(260px,360px);gap:16px}
.counter-card.maximized{width:100vw;height:100vh;max-width:none;border-radius:0;overflow:auto;padding:22px;background:var(--panel)}
.counter-card.maximized{position:fixed;inset:0;z-index:6000}
.counter-card.maximized .counter-screen{min-height:calc(100vh - 95px)}
.counter-card.maximized .result .big{font-size:clamp(44px,8vw,104px)}
.tap-box{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:16px;display:grid;gap:12px}
.photo{width:126px;height:126px;border-radius:16px;object-fit:cover;border:1px solid var(--line);background:var(--panel);display:block}
.result{border-radius:14px;padding:22px;display:grid;place-items:center;text-align:center;border:1px solid var(--line);background:var(--panel-2)}
.result .big{font-size:clamp(34px,6vw,72px);font-weight:900;line-height:1;font-family:"Fraunces",serif}
.result .small{margin-top:10px;font-size:18px;font-weight:800;color:var(--muted)}
.approved{background:rgba(22,163,74,.18);border-color:var(--accent-2)}.rejected,.blocked{background:#7f1d1d;border-color:#450a0a;color:#fff}.rejected *,.blocked *{color:#fff!important}.rejected .pill,.blocked .pill{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
.list{display:grid;gap:8px}.list-item{border:1px solid var(--line);background:var(--panel-2);border-radius:10px;padding:10px;display:flex;justify-content:space-between;gap:12px}
.report-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:start}
.report-block{display:grid;gap:10px;min-width:0}
.report-block h3{margin:0;font-size:18px}
.summary-rows{display:grid;gap:8px}
.summary-row{border:1px solid var(--line);background:var(--panel-2);border-radius:10px;padding:10px;display:grid;gap:7px}
.summary-row strong{font-size:15px}
.summary-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px;font-weight:800}
.pager{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:10px}
.pager .meta{font-size:12px;color:var(--muted);font-weight:800}
.rate-pair{display:grid;gap:6px;min-width:140px}
.rate-pair label{font-size:10px;text-transform:none;letter-spacing:0;color:var(--muted)}
.rate-pair input{padding:7px 8px}
.category-rules{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:12px}
.category-rule{border:1px solid var(--line);background:var(--panel-2);border-radius:10px;padding:10px;display:grid;gap:7px}
.category-rule strong{font-size:14px}
.category-rule select{padding:7px 8px}
.profit{color:var(--accent-2);font-weight:900}
.loss{color:var(--danger);font-weight:900}
.status-pending,.status-pendingApproval{color:var(--warn);font-weight:900}
.status-approved,.status-vendorAccepted,.status-preparing,.status-outForDelivery,.status-delivered{color:var(--accent-2);font-weight:900}
.status-rejected{color:var(--danger);font-weight:900}
.request-timeline{display:flex;gap:6px;flex-wrap:wrap}
.request-timeline .pill{border-radius:8px}
.request-timeline .done{background:rgba(22,163,74,.14);color:var(--accent-2);border-color:rgba(22,163,74,.3)}
.request-timeline .current{background:rgba(180,83,9,.14);color:var(--warn);border-color:rgba(180,83,9,.3)}
.hidden{display:none!important}
.view{display:none}.view.active{display:block}
.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,20px);opacity:0;pointer-events:none;transition:.2s;background:var(--ink);color:var(--bg);padding:12px 18px;border-radius:10px;z-index:9999;font-weight:900;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1100px){.span-3,.span-4,.span-5,.span-6,.span-7,.span-8{grid-column:span 12}.counter-screen{grid-template-columns:1fr}.report-grid{grid-template-columns:1fr}}
.hamburger-btn{display:none;background:none;border:none;color:var(--ink);font-size:24px;cursor:pointer;padding:8px}
@media(max-width:760px){body{padding-left:0;padding-top:0;font-size:14px}.app-sidebar,#sidebarToggleBtn{display:none!important}header,.wrap{padding-left:12px;padding-right:12px}.wrap{padding-top:14px;gap:12px}.brand{align-items:flex-start}.seal{width:42px;height:42px;border-radius:11px}h1{font-size:25px}.sub{font-size:13px}.top-actions{width:100%;margin-left:0}.tabs{gap:6px}.tab{padding:8px 10px;font-size:13px}.grid{gap:10px}.card{padding:12px;border-radius:10px}.card h2,.card h3{font-size:19px}.metric .k{font-size:11px}.metric .v{font-size:24px}.section-title{align-items:flex-start;flex-direction:column}.range-shell{width:100%;margin-left:0}.range-trigger{min-width:0}.range-popover{position:static;width:100%;min-width:0;margin-top:8px;grid-template-columns:1fr}.range-presets{border-right:0;border-bottom:1px solid var(--line)}.range-calendars{grid-template-columns:1fr}.range-month{border-right:0;border-bottom:1px solid var(--line)}.row{grid-template-columns:1fr}.field,.field.third{grid-column:1/-1}input,select,textarea{font-size:13px;padding:9px 10px}.btn{min-height:36px;padding:8px 10px;font-size:13px}.icon-btn{width:34px;height:34px}.table-wrap{border-radius:9px}table{font-size:12px;min-width:640px}th,td{padding:8px}.pill{font-size:10px;padding:3px 7px}.list-item{padding:9px;font-size:13px}.summary-row{padding:9px}.summary-row strong{font-size:14px}.summary-meta{font-size:12px}.counter-screen{min-height:auto;gap:10px}.tap-box{padding:12px}.result{min-height:190px;min-height:5cm;padding:22px 16px}.result .big{font-size:40px}.result .small{font-size:15px}.toast{left:50%;width:calc(100% - 24px);text-align:center}}
</style>

</style>

function uid(prefix){ return prefix + '-' + Math.random().toString(36).slice(2,8).toUpperCase(); }
function nowISO(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }
function dateISO(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function addDays(dateValue, days){ const d = new Date(dateValue + 'T00:00:00'); d.setDate(d.getDate() + days); return dateISO(d); }
function addMonths(dateValue, months){ const d = new Date(dateValue + 'T00:00:00'); d.setMonth(d.getMonth() + months, 1); return dateISO(d); }
function money(n){ return 'Rs. ' + Number(n || 0).toFixed(2); }
function esc(v){ return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  const t = $('toast');

}

function normalizeState(data){
  data.duplicateWindow = Number(data.duplicateWindow || 120);
  data.categories = data.categories || [];
  data.meals = data.meals || [];
  data.rates = data.rates || {};
  data.vendorRates = data.vendorRates || {};
  data.categoryModels = data.categoryModels || {};
  data.categoryDuplicateWindows = data.categoryDuplicateWindows || {};
  data.categorySessionRestrictions = data.categorySessionRestrictions || {};
  data.categorySettings = data.categorySettings || [];
  normalizeRateTables(data);
  normalizeCategorySystemSettings(data);
  data.users = (data.users || []).map(u => ({coupons:{}, wallet:0, ...u, coupons:u.coupons || {}}));
  data.recharges = (data.recharges || []).map(r => normalizeRechargeRecord({remainingAmount:undefined, remainingCoupons:undefined, expired:false, ...r}));
  data.transactions = data.transactions || [];
  data.foodRequests = (data.foodRequests || []).map(r => ({items:[], audit:[], notifications:[], ...r, items:r.items || [], audit:r.audit || [], notifications:r.notifications || []}));
  data.foodRequestConfig = {approvalRequired:false, approverRoles:['Admin','Management'], ...data.foodRequestConfig};
  data.accessControl = data.accessControl || {};
  Object.keys(data.accessControl).forEach(role=>{
    if(!data.accessControl[role].foodRequests){
      const canManage = role === 'Admin' || role === 'Mess Incharge' || role === 'Management';
      data.accessControl[role].foodRequests = {view:canManage || role === 'Accountant', add:role === 'Admin', edit:canManage, delete:role === 'Admin'};
    }
  });
  data.cardHistory = data.cardHistory || [];
  data.portalEmployees = (data.portalEmployees || []).map(e => ({id:uid('PE'), name:'', mobile:'', branch:'', role:'Admin', ...e}));
  data.offlineQueue = data.offlineQueue || [];
  data.audit = data.audit || [];
  data.counters = (data.counters || []).map(c => ({assignedUserIds:[], ...c, assignedUserIds:c.assignedUserIds || []}));
  migrateUserIdsToIntegers(data);
  return data;
}
function normalizeCategorySystemSettings(data){
  const defaultModel = data.model || 'wallet';
  const defaultWindow = Number(data.duplicateWindow || 120);
  if(!data.categorySettings.length){
    data.categories.forEach(c=>{
      const restrict = data.categorySessionRestrictions[c.id] != null ? data.categorySessionRestrictions[c.id] !== false : data.preventPerMealSession !== false;
      const enabled = c.id === 'cat-student';
      data.categorySettings.push({
        id: uid('CS'),
        categoryId: c.id,
        model: data.categoryModels[c.id] || defaultModel,
        duplicateWindow: enabled ? Number(data.categoryDuplicateWindows[c.id] == null ? defaultWindow : data.categoryDuplicateWindows[c.id]) : 0,
        restrictMealSession: enabled ? restrict : false,
        status: enabled ? 'active' : 'inactive'
      });
    });
  }
  data.categorySettings = data.categorySettings.map(s=>({
    id: s.id || uid('CS'),
    categoryId: s.categoryId || (data.categories[0] || {}).id || '',
    model: s.model === 'coupon' ? 'coupon' : 'wallet',
    duplicateWindow: Number(s.duplicateWindow == null ? defaultWindow : s.duplicateWindow),
    restrictMealSession: s.restrictMealSession === true,
    status: s.status === 'inactive' ? 'inactive' : 'active'
  }));
  data.categories.forEach(c=>{
    if(data.categorySettings.some(s=>s.categoryId === c.id)) return;
    data.categorySettings.push({id:uid('CS'), categoryId:c.id, model:defaultModel, duplicateWindow:0, restrictMealSession:false, status:'inactive'});
  });
}
function normalizeRateTables(data){
  data.meals.forEach(m=>{
    data.rates[m.id] = data.rates[m.id] || {};
    data.vendorRates[m.id] = data.vendorRates[m.id] || {};
    data.categories.forEach(c=>{
      if(data.rates[m.id][c.id] == null) data.rates[m.id][c.id] = 0;
      if(data.vendorRates[m.id][c.id] == null) data.vendorRates[m.id][c.id] = Number(data.rates[m.id][c.id] || 0);
    });
  });
}
function migrateUserIdsToIntegers(data){
  const idMap = {};
  let next = 1;
  data.users.forEach(u=>{
    const oldId = String(u.id);
    let newId = Number.isInteger(Number(u.id)) && Number(u.id) > 0 ? Number(u.id) : next;
    while(data.users.some(other => other !== u && Number(other.id) === newId) || Object.values(idMap).includes(newId)) newId++;
    idMap[oldId] = newId;
    u.id = newId;
    next = Math.max(next, newId + 1);
  });
  const mapId = value => idMap[String(value)] || (Number.isInteger(Number(value)) ? Number(value) : value);
  data.recharges.forEach(r=>{ r.userId = mapId(r.userId); });
  data.transactions.forEach(t=>{ t.userId = t.userId ? mapId(t.userId) : ''; });
  data.cardHistory.forEach(h=>{ h.userId = mapId(h.userId); });
  data.counters.forEach(c=>{ c.assignedUserIds = (c.assignedUserIds || []).map(mapId); });
}

function isExpiredDate(dateValue){
  if(!dateValue) return false;
  const end = new Date(String(dateValue) + 'T23:59:59');
  return !Number.isNaN(end.getTime()) && Date.now() > end.getTime();
}
function rechargeMealIds(rec){
  if(!rec) return [];
  if(Array.isArray(rec.mealIds)) return rec.mealIds.filter(Boolean);
  return rec.mealId ? [rec.mealId] : [];
}
function setRechargeMealIds(rec, mealIds){
  rec.mealIds = Array.from(new Set((mealIds || []).filter(Boolean)));
  rec.mealId = rec.mealIds.length === 1 ? rec.mealIds[0] : '';
}
function normalizeRechargeRecord(rec){
  setRechargeMealIds(rec, rechargeMealIds(rec));
  if(rec.mealIds.length && !rec.remainingCouponsByMeal){
    rec.remainingCouponsByMeal = {};
    rec.mealIds.forEach(mealId=>{ rec.remainingCouponsByMeal[mealId] = rec.remainingCoupons == null ? Number(rec.coupons || 0) : Number(rec.remainingCoupons || 0); });
  }
  return rec;
}
function rechargeMealLabel(rec){
  const ids = rechargeMealIds(rec);
  return ids.length ? ids.map(mealName).join(', ') : 'Wallet Only';
}
function rechargeCouponDetail(rec){
  const ids = rechargeMealIds(rec);
  if(!ids.length) return 'Wallet Only';
  return ids.map(mealId=>`${mealName(mealId)}: ${Number(rec.coupons || 0)} / left ${recRemainingCoupons(rec, mealId)}`).join('; ');
}
function rechargeCouponExportRows(rows){
  const couponHeaders = state.meals.flatMap(m=>[m.name+' Coupons', m.name+' Remaining']);
  return [['Receipt','Date','User','Amount','Remaining Amount','Meals'].concat(couponHeaders).concat(['Valid Till','Status','Wallet After','Operator','Remarks'])].concat(rows.map(r=>{
    const mealCells = state.meals.flatMap(m=>{
      const selected = rechargeMealIds(r).includes(m.id);
      return [selected ? Number(r.coupons || 0) : 0, selected ? recRemainingCoupons(r, m.id) : 0];
    });
    return [r.id,r.at,r.userId,r.amount,recRemainingAmount(r),rechargeMealLabel(r)].concat(mealCells).concat([r.validTill || '',r.expired ? 'Expired' : 'Active',r.afterWallet,r.operator,r.remarks || '']);
  }));
}
function rechargeAllowsMeal(rec, mealId){
  const ids = rechargeMealIds(rec);
  return !mealId || !ids.length || ids.includes(mealId);
}
function activeRechargesFor(userId, mealId){
  expireRecharges();
  return state.recharges
    .filter(r => r.userId === userId && !r.expired && (!r.validTill || !isExpiredDate(r.validTill)))
    .filter(r => rechargeAllowsMeal(r, mealId));
}
function recRemainingAmount(rec){
  return rec.remainingAmount == null ? Number(rec.amount || 0) : Number(rec.remainingAmount || 0);
}
function recRemainingCoupons(rec, mealId){
  if(mealId && rec.remainingCouponsByMeal) return Number(rec.remainingCouponsByMeal[mealId] || 0);
  if(rec.remainingCouponsByMeal) return Object.values(rec.remainingCouponsByMeal).reduce((sum,value)=>sum + Number(value || 0), 0);
  return rec.remainingCoupons == null ? Number(rec.coupons || 0) : Number(rec.remainingCoupons || 0);
}
function userHasActiveRecharge(userId){
  return state.recharges.some(r => r.userId === userId && !r.expired && (!r.validTill || !isExpiredDate(r.validTill)));
}
function availableRechargeAmount(userId, mealId){
  return activeRechargesFor(userId, mealId).reduce((sum,rec)=>sum + recRemainingAmount(rec), 0);
}
function availableRechargeCoupons(userId, mealId){
  return activeRechargesFor(userId, mealId).reduce((sum,rec)=>sum + recRemainingCoupons(rec, mealId), 0);
}
function expireRecharges(){
  let changed = false;
  state.recharges.forEach(rec=>{
    if(rec.expired || !rec.validTill || !isExpiredDate(rec.validTill)) return;
    const u = state.users.find(x=>x.id===rec.userId);
    const amountLeft = recRemainingAmount(rec);
    if(u){
      u.wallet = Math.max(0, Number(u.wallet || 0) - amountLeft);
      rechargeMealIds(rec).forEach(mealId=>{
        const mealCouponLeft = recRemainingCoupons(rec, mealId);
        if(!mealCouponLeft) return;
        u.coupons = u.coupons || {};
        u.coupons[mealId] = Math.max(0, Number(u.coupons[mealId] || 0) - mealCouponLeft);
      });
    }
    rec.remainingAmount = 0;
    rec.remainingCoupons = 0;
    if(rec.remainingCouponsByMeal) Object.keys(rec.remainingCouponsByMeal).forEach(mealId=>{ rec.remainingCouponsByMeal[mealId] = 0; });
    rec.expired = true;
    rec.expiredAt = nowISO();
    changed = true;
  });
  if(changed){
    audit('Expired recharge validity balances');
    localStorage.setItem(DB_KEY, JSON.stringify(state));
  }
}
function isUserValidityExpired(user){
  return user && isExpiredDate(user.cardExpiryDate);
}
function zeroExpiredUserBalance(user){
  if(!user || !isUserValidityExpired(user)) return false;
  const hadWallet = Number(user.wallet || 0) !== 0;
  const hadCoupons = Object.values(user.coupons || {}).some(v=>Number(v || 0) !== 0);
  if(!hadWallet && !hadCoupons && user.validityExpired) return false;
  user.wallet = 0;
  user.coupons = {};
  user.validityExpired = true;
  user.validityExpiredAt = user.validityExpiredAt || nowISO();
  return true;
}
function syncUserExpiryFromRecharge(user, rec){
  if(!user || !rec || !rec.validTill) return;
  user.cardExpiryDate = rec.validTill;
  if(!isExpiredDate(rec.validTill)){
    user.validityExpired = false;
    user.validityExpiredAt = '';
  }
}
function expireUserValidities(){
  let changed = false;
  state.users.forEach(user=>{
    if(zeroExpiredUserBalance(user)){
      audit('Expired user validity balance '+user.id);
      changed = true;
    }
  });
  if(changed) localStorage.setItem(DB_KEY, JSON.stringify(state));
}

function parseCSV(text){

  const delimiter = (firstLine.match(/\t/g) || []).length > (firstLine.match(/,/g) || []).length ? '\t' : ',';

  for(let i=0;i<text.length;i++){
    const ch = text[i], next = text[i+1];
    if(ch === '"' && quote && next === '"'){ cell += '"'; i++; }
    else if(ch === '"'){ quote = !quote; }
    else if(ch === delimiter && !quote){ row.push(cell); cell = ''; }
    else if((ch === '\n' || ch === '\r') && !quote){
      if(ch === '\r' && next === '\n') i++;
      row.push(cell); cell = '';
      if(row.some(v=>String(v).trim() !== '')) rows.push(row);

    }else cell += ch;
  }
  row.push(cell);

function rowsToCSV(rows, filename){
  const csv = rows.map(row => row.map(v => '"' + String(v == null ? '' : v).replace(/"/g,'""') + '"').join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function consumeRechargeAmount(userId, amount, mealId){
  let remaining = Number(amount || 0);
  activeRechargesFor(userId, mealId).forEach(rec=>{
    if(remaining <= 0) return;
    const left = recRemainingAmount(rec);
    const take = Math.min(left, remaining);
    rec.remainingAmount = left - take;
    remaining -= take;
  });
}
function consumeRechargeCoupon(userId, mealId){
  const rec = activeRechargesFor(userId, mealId).find(r => recRemainingCoupons(r, mealId) > 0);
  if(!rec) return;
  if(rec.remainingCouponsByMeal) rec.remainingCouponsByMeal[mealId] = recRemainingCoupons(rec, mealId) - 1;
  else rec.remainingCoupons = recRemainingCoupons(rec) - 1;
}

function foodStatusLabel(status){
  return ({raised:'Request Raised', pendingApproval:'Pending Approval', approved:'Approved', vendorAccepted:'Vendor Accepted', preparing:'Preparing', outForDelivery:'Out for Delivery', delivered:'Delivered', rejected:'Rejected'})[status] || status || 'Request Raised';
}
function requestItemsLabel(req){
  return (req.items || []).map(i=>`${i.qty} x ${i.name}`).join(', ') || '-';
}
function requestTotal(req){ return (req.items || []).reduce((sum,i)=>sum + Number(i.qty || 0) * Number(i.price || 0), 0); }
function requestVendorTotal(req){ return (req.items || []).reduce((sum,i)=>sum + Number(i.qty || 0) * Number(i.vendor || 0), 0); }
function requestUser(req){ return state.users.find(u=>u.id === req.userId) || null; }
function requestAddTrail(req, action, note=''){
  req.audit = req.audit || [];
  req.audit.unshift({at:nowISO(), actor:currentActorName(), action, note});
}
function queueNotification(req, event, message){
  req.notifications = req.notifications || [];
  const channels = ['Email','SMS','WhatsApp'];
  req.notifications.unshift({at:nowISO(), event, message, channels});
  state.notifications = state.notifications || [];
  state.notifications.unshift({at:nowISO(), module:'foodRequests', requestId:req.id, event, message, channels});
}
function setFoodRequestStatus(req, status, note=''){
  req.status = status;
  req.updatedAt = nowISO();
  if(status === 'approved') req.approvedAt = req.updatedAt;
  if(status === 'vendorAccepted') req.acceptedAt = req.updatedAt;
  if(status === 'delivered') req.deliveredAt = req.updatedAt;
  if(status === 'rejected') req.rejectedAt = req.updatedAt;
  requestAddTrail(req, foodStatusLabel(status), note);
}
function foodRequestWorkflowSteps(req){
  const base = ['raised'];
  if(state.foodRequestConfig?.approvalRequired) base.push('pendingApproval','approved');
  else base.push('approved');
  return base.concat(['vendorAccepted','preparing','outForDelivery','delivered']);
}
function foodRequestTimelineHTML(req){
  const steps = foodRequestWorkflowSteps(req);
  const currentIndex = steps.indexOf(req.status);
  return `<div class="request-timeline">${steps.map((s,i)=>`<span class="pill ${i < currentIndex || req.status === 'delivered' ? 'done' : i === currentIndex ? 'current' : ''}">${esc(foodStatusLabel(s))}</span>`).join('')}</div>`;
}
function createFoodRequestFromForm(){
  const type = $('frType').value;
  const typeInfo = foodRequestTypes().find(t=>t.id === type) || foodRequestTypes()[0];
  const qty = Number($('frQty').value || 0);
  const user = findUserBySearch($('frUser').value);
  const when = $('frWhen').value;
  const location = $('frLocation').value.trim();
  const customName = $('frCustomItem').value.trim();
  const unitPrice = Number($('frUnitPrice').value || typeInfo.price || 0);
  const vendorCost = Number($('frVendorCost').value || typeInfo.vendor || 0);
  if(!when) return toast('Select request date and time');
  if(!location) return toast('Enter delivery location');
  if(!qty || qty < 1) return toast('Enter a valid quantity');
  if(!user) return toast('Select a valid RFID account to charge');
  if(unitPrice < 0 || vendorCost < 0) return toast('Rates cannot be negative');
  const name = type === 'custom' ? customName : typeInfo.name;
  if(!name) return toast('Enter custom item name');
  const req = {
    id:uid('FR'),
    createdAt:nowISO(),
    updatedAt:nowISO(),
    requestedAt:new Date(when).toISOString(),
    location,
    department:user.department || 'Unassigned',
    requestor:currentActorName(),
    purpose:$('frRemarks').value.trim(),
    userId:user.id,
    status:state.foodRequestConfig?.approvalRequired ? 'pendingApproval' : 'approved',
    items:[{type, name, qty, price:unitPrice, vendor:vendorCost}],
    rejectionReason:'',
    audit:[],
    notifications:[]
  };
  requestAddTrail(req, 'Request Raised', req.purpose);
  if(req.status === 'pendingApproval') queueNotification(req, 'Approval Required', `${req.id} requires approval for ${user.name}`);
  else queueNotification(req, 'Request Created', `${req.id} was created and sent to vendor`);
  state.foodRequests.unshift(req);
  audit('Created food request '+req.id+' for '+user.name);
  save();
  toast('Food request created');
}
function approveFoodRequest(reqId){
  const req = state.foodRequests.find(r=>r.id===reqId);
  if(!req || req.status !== 'pendingApproval') return;
  setFoodRequestStatus(req, 'approved', 'Approved by '+currentActorName());
  queueNotification(req, 'Request Approved', `${req.id} approved and sent to vendor`);
  audit('Approved food request '+req.id);
  save();
}
function rejectFoodRequest(reqId){
  const req = state.foodRequests.find(r=>r.id===reqId);
  if(!req || req.status === 'delivered') return;
  const reason = prompt('Reject reason') || '';
  if(!reason.trim()) return toast('Reject reason required');
  req.rejectionReason = reason.trim();
  setFoodRequestStatus(req, 'rejected', req.rejectionReason);
  queueNotification(req, 'Request Rejected', `${req.id} rejected: ${req.rejectionReason}`);
  audit('Rejected food request '+req.id);
  save();
}
function vendorMoveFoodRequest(reqId, status){
  const req = state.foodRequests.find(r=>r.id===reqId);
  if(!req || ['rejected','delivered'].includes(req.status)) return;
  setFoodRequestStatus(req, status);
  const event = status === 'vendorAccepted' ? 'Request Accepted' : foodStatusLabel(status);
  queueNotification(req, event, `${req.id} is ${foodStatusLabel(status).toLowerCase()}`);
  audit(event+' for food request '+req.id);
  save();
}
function confirmFoodRequestDelivery(reqId, scan){
  const req = state.foodRequests.find(r=>r.id===reqId);
  if(!req) return toast('Request not found');
  if(req.status !== 'outForDelivery') return toast('Move request to Out for Delivery first');
  const user = requestUser(req);
  const clean = String(scan || '').trim();
  if(!user) return toast('Charge account is missing');
  if(!clean) return toast('Scan RFID to confirm delivery');
  if(![user.rfid, user.empNo, String(user.id)].some(v=>String(v || '').toLowerCase() === clean.toLowerCase())){
    requestAddTrail(req, 'RFID Verification Failed', clean);
    audit('Failed RFID delivery verification for '+req.id);
    save();
    return toast('RFID verification failed. Delivery not completed.');
  }
  if(user.status !== 'active') return toast('RFID account is not active');
  if(isUserValidityExpired(user)){ zeroExpiredUserBalance(user); save(); return toast('RFID account validity expired'); }
  const amount = requestTotal(req);
  const vendorAmount = requestVendorTotal(req);
  if(userHasActiveRecharge(user.id) && availableRechargeAmount(user.id, '') < amount) return toast('Recharge balance is insufficient');
  if(Number(user.wallet || 0) < amount) return toast('Wallet balance is insufficient');
  user.wallet = Number(user.wallet || 0) - amount;
  consumeRechargeAmount(user.id, amount, '');
  const tx = {id:uid('TX'), at:nowISO(), rfid:user.rfid, counterId:'food-request', userId:user.id, mealId:'food-request', amount, vendorAmount, status:'approved', reason:'Admin food request '+req.id, requestId:req.id, source:'foodRequest'};
  state.transactions.unshift(tx);
  req.transactionId = tx.id;
  req.verifiedRfid = user.rfid;
  setFoodRequestStatus(req, 'delivered', 'RFID verified for '+user.name);
  activeRequestScanId = null;
  queueNotification(req, 'Delivered', `${req.id} delivered and charged ${money(amount)}`);
  audit('Delivered food request '+req.id+' and charged '+user.name);
  save();
  beep('success');
  toast('Delivered and charged to RFID wallet');
}
function updateNavButtonAccessControl(){
  // Get current user's role
  const employee = findEmployeeById(currentEmployeeId);
  const role = employee?.role || 'Unknown';

  // Update visibility of top navigation buttons based on access control
  document.querySelectorAll('.tab').forEach(btn => {
    const screen = btn.dataset.view;
    // For admin users, show all screens. For others, check access control
    let hasAccess = role === 'Admin' ? true : (state.accessControl?.[role]?.[screen]?.['view'] === true);

    // If screen not in access control for non-admin, hide it
    if(role !== 'Admin' && state.accessControl?.[role] && !(screen in state.accessControl[role])){
      hasAccess = false;
    }

    btn.hidden = !hasAccess;
  });
}

  try{

function foodRequestActionsHTML(req, role){
  const actions = [];
  if(req.status === 'pendingApproval' && (role === 'Admin' || (state.foodRequestConfig?.approverRoles || []).includes(role))){
    actions.push(`<button class="btn good" data-approve-food="${req.id}" type="button">Approve</button>`);
    actions.push(`<button class="btn danger" data-reject-food="${req.id}" type="button">Reject</button>`);
  }
  if(req.status === 'approved'){
    actions.push(`<button class="btn good" data-food-status="${req.id}:vendorAccepted" type="button">Accept</button>`);
    actions.push(`<button class="btn danger" data-reject-food="${req.id}" type="button">Reject</button>`);
  }
  if(req.status === 'vendorAccepted') actions.push(`<button class="btn" data-food-status="${req.id}:preparing" type="button">Preparing</button>`);
  if(req.status === 'preparing') actions.push(`<button class="btn" data-food-status="${req.id}:outForDelivery" type="button">Out for Delivery</button>`);
  if(req.status === 'outForDelivery') actions.push(`<button class="btn primary" data-open-food-scan="${req.id}" type="button">RFID Deliver</button>`);
  return actions.length ? `<div class="icon-actions" style="flex-wrap:wrap">${actions.join('')}</div>` : `<span class="pill">${esc(foodStatusLabel(req.status))}</span>`;
}

async function importUsersCSV(file){
  const rows = parseCSV(await fileText(file));
  if(rows.length < 2) return toast('CSV has no users');
  const headers = rows[0].map(h=>String(h).replace(/^\ufeff/, '').trim().toLowerCase());
  const idx = name => headers.indexOf(name);
  const val = (row, name) => {
    const i = idx(name);
    return i >= 0 ? String(row[i] || '').trim() : '';
  };
  let added = 0, skipped = 0;
  rows.slice(1).forEach(row=>{
    const categoryText = val(row, 'category') || 'Student';
    const cat = state.categories.find(c=>c.name.toLowerCase() === String(categoryText).trim().toLowerCase()) || state.categories[0];
    const id = nextUserId();
    const rfid = val(row, 'rfid');
    const name = val(row, 'name');
    if(!rfid || !name || state.users.some(u=>Number(u.id)===Number(id) || u.rfid.toLowerCase()===String(rfid).toLowerCase())){ skipped++; return; }
    state.users.push({id, rfid, empNo:val(row, 'emp_no'), name, mobile:val(row, 'mobile'), email:val(row, 'email'), categoryId:cat.id, department:val(row, 'department'), branch:val(row, 'branch'), photo:'', status:'active', joinDate:today(), cardIssueDate:today(), cardExpiryDate:val(row, 'expiry_date')||'2027-12-31', wallet:0, coupons:{}, createdBy:'Bulk Upload', createdAt:nowISO()});
    added++;
  });
  audit('Bulk uploaded users: '+added);
  save(); toast('Imported '+added+' users. Skipped '+skipped+'.');
}
function filteredUsers(){
  const query = String($('userSearch') ? $('userSearch').value : '').toLowerCase();
  const category = $('userCategoryFilter') ? $('userCategoryFilter').value : '';
  const status = $('userStatusFilter') ? $('userStatusFilter').value : '';
  return state.users.filter(u=>{
    const validity = userValidityStatus(u);
    const haystack = [userSearchTerms(u),u.department,u.branch,categoryName(u.categoryId),u.status,validity.label].join(' ').toLowerCase();
    return (!query || haystack.includes(query)) && (!category || u.categoryId === category) && (!status || validity.value === status);
  });
}
function filteredBalanceUsers(){

function applyRecharge(rec){
  const u = state.users.find(x=>x.id===rec.userId);
  if(!u) return;
  normalizeRechargeRecord(rec);
  syncUserExpiryFromRecharge(u, rec);
  u.wallet = Number(u.wallet || 0) + Number(rec.amount || 0);
  rec.remainingAmount = Number(rec.amount || 0);
  rec.remainingCoupons = Number(rec.coupons || 0);
  rec.remainingCouponsByMeal = {};
  rechargeMealIds(rec).forEach(mealId=>{
    if(!Number(rec.coupons || 0)) return;
    u.coupons = u.coupons || {};
    u.coupons[mealId] = Number(u.coupons[mealId] || 0) + Number(rec.coupons || 0);
    rec.remainingCouponsByMeal[mealId] = Number(rec.coupons || 0);
  });
  rec.afterWallet = u.wallet;
}
function reverseRecharge(rec){
  const u = state.users.find(x=>x.id===rec.userId);
  if(!u) return;
  u.wallet = Math.max(0, Number(u.wallet || 0) - recRemainingAmount(rec));
  rechargeMealIds(rec).forEach(mealId=>{
    if(!Number(rec.coupons || 0)) return;
    u.coupons = u.coupons || {};
    u.coupons[mealId] = Math.max(0, Number(u.coupons[mealId] || 0) - recRemainingCoupons(rec, mealId));
  });
}
function mealIdsFromCSV(value){
  return mealParseFromCSV(value).ids;
}
function mealParseFromCSV(value){
  const tokens = String(value || '')
    .split(/[;|,]+/)
    .map(v=>String(v).trim())
    .filter(Boolean);
  const ids = [];
  const unknown = [];
  tokens.forEach(text=>{
    const q = text.toLowerCase();
    const meal = state.meals.find(m=>m.id.toLowerCase() === q || m.name.toLowerCase() === q);
    if(meal) ids.push(meal.id);
    else unknown.push(text);
  });
  return {ids:Array.from(new Set(ids)), unknown};
}
function normalizeCSVDate(value){
  const raw = String(value || '').trim();
  if(!raw) return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const match = raw.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2}|\d{4})$/);
  if(!match) return raw;
  const day = match[1].padStart(2, '0');
  const month = match[2].padStart(2, '0');
  const year = match[3].length === 2 ? '20' + match[3] : match[3];
  return `${year}-${month}-${day}`;
}
function rechargeImportResultHTML(){
  const result = rechargeImportResult;
  const failures = result.failures || [];
  return `<div class="table-wrap" style="margin-bottom:12px"><table><thead><tr><th colspan="5">Bulk Upload Result: ${result.added} imported, ${result.skipped} skipped</th></tr><tr><th>Row</th><th>User</th><th>Meal Coupons</th><th>Amount/Coupons</th><th>Reason</th></tr></thead><tbody>${failures.length ? failures.map(f=>`<tr><td>${f.row}</td><td>${esc(f.user || '-')}</td><td>${esc(f.meals || '-')}</td><td>${esc(f.amount)} / ${esc(f.coupons)}</td><td>${esc(f.reason)}</td></tr>`).join('') : '<tr><td colspan="5">All rows imported successfully</td></tr>'}</tbody></table></div>`;
}
async function importRechargeCSV(file){
  const rows = parseCSV(await fileText(file));
  if(rows.length < 2) return toast('CSV has no recharge rows');
  const headers = rows[0].map(h=>String(h).replace(/^\ufeff/, '').trim().toLowerCase());
  const idx = name => headers.indexOf(name);
  const val = (row, name) => {
    const i = idx(name);
    return i >= 0 ? String(row[i] || '').trim() : '';
  };
  let added = 0, skipped = 0;
  const failures = [];
  rows.slice(1).forEach((row,index)=>{
    const userText = val(row, 'user') || val(row, 'rfid') || val(row, 'user_id') || val(row, 'mobile');
    const u = findUserBySearch(userText);
    const amount = Number(val(row, 'amount') || 0);
    const coupons = Number(val(row, 'coupons') || 0);
    const mealText = val(row, 'meal_coupons') || val(row, 'meals') || val(row, 'meal');
    const mealResult = mealParseFromCSV(mealText);
    const reasons = [];
    if(!u) reasons.push('User not found. Use RFID, user ID, mobile, name, or employee/student no.');
    if(Number.isNaN(amount)) reasons.push('Amount is not a valid number');
    if(Number.isNaN(coupons)) reasons.push('Coupons is not a valid number');
    if(coupons > 0 && !mealResult.ids.length) reasons.push('Coupons entered but no valid meal coupon selected');
    if(mealResult.unknown.length) reasons.push('Unknown meal: '+mealResult.unknown.join(', '));
    if(reasons.length){ skipped++; failures.push({row:index + 2, user:userText, meals:mealText, amount:val(row, 'amount'), coupons:val(row, 'coupons'), reason:reasons.join('; ')}); return; }
    const rec = {id:uid('RC'), userId:u.id, amount, mealIds:mealResult.ids, mealId:mealResult.ids.length === 1 ? mealResult.ids[0] : '', coupons, validTill:normalizeCSVDate(val(row, 'valid_till') || val(row, 'validity') || val(row, 'expiry_date')), remainingAmount:amount, remainingCoupons:coupons, remainingCouponsByMeal:{}, expired:false, afterWallet:0, operator:'Bulk Upload', remarks:val(row, 'remarks'), at:nowISO()};
    applyRecharge(rec);
    state.recharges.unshift(rec);
    added++;
  });
  rechargeImportResult = {added, skipped, failures};
  audit('Bulk uploaded recharges: '+added);
  save(); toast('Imported '+added+' recharges. Skipped '+skipped+'.');
}

function filteredConsumptionTransactions(){
  const f = consumptionReportFilters;
  const query = String(f.search || '').toLowerCase();
  const categoryIds = f.categoryIds || [];
  const mealIds = f.mealIds || [];
  const counterIds = f.counterIds || [];
  return state.transactions.filter(t=>{
    const user = state.users.find(u=>u.id===t.userId) || {};
    const amount = Number(t.amount || 0);
    const vendor = txVendorAmount(t);
    const profit = amount - vendor;
    const date = String(t.at || '').slice(0,10);
    const haystack = [t.id,t.at,t.userId,t.rfid,t.status,t.reason,userSearchTerms(user),categoryName(user.categoryId),mealName(t.mealId),counterLocation(t.counterId)].join(' ').toLowerCase();
    if(query && !haystack.includes(query)) return false;
    if(f.from && date < f.from) return false;
    if(f.to && date > f.to) return false;
    if(categoryIds.length && !categoryIds.includes(user.categoryId)) return false;
    if(mealIds.length && !mealIds.includes(t.mealId)) return false;
    if(counterIds.length && !counterIds.includes(t.counterId)) return false;
    if(f.status && t.status !== f.status) return false;
    if(f.profit === 'profit' && profit <= 0) return false;
    if(f.profit === 'loss' && profit >= 0) return false;
    if(f.profit === 'even' && profit !== 0) return false;
    return true;
  });
}

      consumptionReportPage = 1;
      renderReports();
    };
  });
  $('reportRangeBtn').onclick = () => { reportPickerOpen = !reportPickerOpen; renderReports(); };
  document.querySelectorAll('[data-report-range-preset]').forEach(b=>b.onclick=()=>{ applyReportPreset(b.dataset.reportRangePreset); reportPickerOpen = false; renderReports(); });
  document.querySelectorAll('[data-report-range-date]').forEach(b=>b.onclick=()=>{ chooseReportDate(b.dataset.reportRangeDate); renderReports(); });
  document.querySelectorAll('[data-report-range-shift]').forEach(b=>b.onclick=()=>{ reportPickerMonth = addMonths(reportPickerMonth, Number(b.dataset.reportRangeShift)); renderReports(); });
  document.querySelectorAll('[data-report-range-year],[data-report-range-month]').forEach(s=>s.onchange=()=>{
    const offset = Number(s.dataset.reportRangeYear ?? s.dataset.reportRangeMonth);
    const yearSelect = document.querySelector(`[data-report-range-year="${offset}"]`);
    const monthSelect = document.querySelector(`[data-report-range-month="${offset}"]`);
    const nextPanel = dateISO(new Date(Number(yearSelect.value), Number(monthSelect.value), 1));
    reportPickerMonth = addMonths(nextPanel, -offset);
    renderReports();
  });
  $('clearReportFilters').onclick = () => { consumptionReportFilters = {search:'', from:'', to:'', categoryIds:[], mealIds:[], counterIds:[], status:'', profit:'', pageSize:Number(consumptionReportFilters.pageSize || 10)}; reportPickerOpen = false; reportDraftStart = null; consumptionReportPage = 1; renderReports(); };
  $('reportPrev').onclick = () => { if(consumptionReportPage > 1){ consumptionReportPage--; renderReports(); } };
  $('reportNext').onclick = () => { consumptionReportPage++; renderReports(); };
}

function transactionTable(rows){
  return `<div class="table-wrap"><table><thead><tr><th>Time</th><th>User</th><th>RFID</th><th>Category</th><th>Meal</th><th>Counter</th><th>Amount</th><th>Vendor</th><th>P/L</th><th>Status</th><th>Reason</th></tr></thead><tbody>${rows.map(t=>{
    const amount = Number(t.amount || 0);
    const vendor = txVendorAmount(t);
    const profit = amount - vendor;
    const user = state.users.find(u=>u.id===t.userId) || {};
    return `<tr><td>${new Date(t.at).toLocaleString()}</td><td>${esc(user.name || t.userId || '-')}</td><td>${esc(t.rfid)}</td><td>${esc(categoryName(user.categoryId))}</td><td>${esc(mealName(t.mealId))}</td><td>${esc(counterLocation(t.counterId))}</td><td>${money(amount)}</td><td>${money(vendor)}</td><td><span class="${profitClass(profit)}">${money(profit)}</span></td><td>${esc(t.status)}</td><td>${esc(t.reason)}</td></tr>`;
  }).join('') || `<tr><td colspan="11">No transactions found</td></tr>`}</tbody></table></div>`;
}
function usageSummaryHTML(rows, hideVendorProfit=false){
  const data = rows.length ? rows : [{name:'No data', count:0, amount:0, vendor:0, profit:0}];
  return `<div class="summary-rows">${data.map(r=>{
    const profit = Number(r.profit || 0);
    return `<div class="summary-row"><strong>${esc(r.name)}</strong><div class="summary-meta"><span>${Number(r.count||0)} used</span><span>Sale ${money(r.amount)}</span></div>${!hideVendorProfit ? `<div class="summary-meta"><span>Vendor ${money(r.vendor)}</span><span class="${profitClass(profit)}">P/L ${money(profit)}</span></div>` : ''}</div>`;

}
function filteredRecharges(){
  const query = String($('rechargeSearch') ? $('rechargeSearch').value : '').toLowerCase();
  const status = $('rechargeStatusFilter') ? $('rechargeStatusFilter').value : '';
  const meal = $('rechargeMealFilter') ? $('rechargeMealFilter').value : '';
  return state.recharges.filter(r=>{
    const u = state.users.find(x=>x.id===r.userId) || {};
    const activeStatus = r.expired ? 'expired' : 'active';
    const mealIds = rechargeMealIds(r);
    const mealType = mealIds.length ? mealIds : ['wallet'];
    const haystack = [r.id,r.at,r.userId,userSearchTerms(u),r.amount,r.coupons,r.validTill,r.operator,r.remarks,rechargeMealLabel(r),activeStatus].join(' ').toLowerCase();
    return (!query || haystack.includes(query)) && (!status || activeStatus === status) && (!meal || mealType.includes(meal));
  });
}
function drawRechargeTable(){
  const rows = filteredRecharges();
  $('rechargeTable').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Receipt</th><th>User</th><th>Amount</th><th>Coupons</th><th>Validity</th><th>Balance After</th><th>Date</th><th>Action</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.id}</td><td>${esc((state.users.find(u=>u.id===r.userId)||{}).name)}<br><span class="mono">${esc(r.userId)}</span></td><td>${money(r.amount)}<br><span class="pill">left ${money(recRemainingAmount(r))}</span></td><td>${esc(rechargeCouponDetail(r))}<br><span class="pill">total left ${recRemainingCoupons(r)}</span></td><td>${r.validTill ? esc(r.validTill) : 'No expiry'}<br><span class="pill">${r.expired ? 'expired' : 'active'}</span></td><td>${money(r.afterWallet)}</td><td>${new Date(r.at).toLocaleString()}${r.editedAt ? '<br><span class="pill">edited</span>' : ''}</td><td><div class="icon-actions"><button class="icon-btn edit" data-edit-recharge="${r.id}" title="Edit recharge" aria-label="Edit recharge">&#9998;</button><button class="icon-btn delete" data-delete-recharge="${r.id}" title="Delete recharge" aria-label="Delete recharge">&#128465;</button></div></td></tr>`).join('')}</tbody></table></div>`;
  document.querySelectorAll('[data-edit-recharge]').forEach(b=>b.onclick=()=>{ editingRechargeId = b.dataset.editRecharge; render(); });
  document.querySelectorAll('[data-delete-recharge]').forEach(b=>b.onclick=()=>{
    const rec = state.recharges.find(r=>r.id===b.dataset.deleteRecharge);
    if(!rec || !confirm('Delete recharge '+rec.id+'?')) return;
    reverseRecharge(rec);
    state.recharges = state.recharges.filter(r=>r.id!==rec.id);
    if(editingRechargeId === rec.id) editingRechargeId = null;
    audit('Deleted recharge '+rec.id);
    save(); toast('Recharge deleted');
  });
}

  if(!currentEmployeeId && view !== 'login'){
    window.location.hash = 'login';
    render();
    return;
  }
  console.log('Navigating to:', view);
  activeView = view;
  window.location.hash = view;
  setTimeout(()=>render(), 10);
}

window.addEventListener('hashchange', ()=>{
  const hash = window.location.hash.slice(1);
  const validScreens = ['login','dashboard','vendorDashboard','foodRequests','counter','users','cards','recharge','settings','accessControl','reports','docs'];

  if(hash === 'login'){
    activeView = currentEmployeeId ? 'dashboard' : 'login';
    if(currentEmployeeId) window.location.hash = 'dashboard';
    render();
    return;
  }

  // Require authentication to navigate to protected screens
  if(!currentEmployeeId && hash && hash !== 'login'){
    window.location.hash = 'login';
    render();
    return;
  }

  if(hash && validScreens.includes(hash)){
    activeView = hash;
    render();
  } else if(!hash && currentEmployeeId){
    // Redirect to dashboard if no hash but authenticated
    activeView = 'dashboard';
    window.location.hash = 'dashboard';
    render();
  } else if(!hash && !currentEmployeeId){
    // Redirect to login if no hash and not authenticated
    window.location.hash = 'login';
    activeView = 'login';
    render();
  } else if(!validScreens.includes(hash)){
    // Invalid route - redirect to login if not authenticated, dashboard if authenticated
    if(!currentEmployeeId){
      window.location.hash = 'login';
    } else {
      window.location.hash = 'dashboard';
    }
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('rfid-sw.js').catch(()=>{}));
}

const initialHash = window.location.hash.slice(1);
const validScreens = ['login','dashboard','vendorDashboard','foodRequests','counter','users','cards','recharge','settings','accessControl','reports','docs'];

if(initialHash === 'login'){
  activeView = currentEmployeeId ? 'dashboard' : 'login';
  if(currentEmployeeId) window.location.hash = 'dashboard';
} else if(currentEmployeeId && initialHash && validScreens.includes(initialHash)){
  activeView = initialHash;
} else if(!currentEmployeeId){
  // Not authenticated - go to login
  window.location.hash = 'login';
  activeView = 'login';
} else if(currentEmployeeId && !initialHash){
  // Authenticated but no hash - go to dashboard
  window.location.hash = 'dashboard';
  activeView = 'dashboard';
} else if(!validScreens.includes(initialHash)){
  // Invalid route
  if(!currentEmployeeId){
    window.location.hash = 'login';
    activeView = 'login';

    window.location.hash = 'dashboard';
